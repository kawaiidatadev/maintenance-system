{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>{{ 'Editar' if activity else 'Nueva' }} Actividad Estándar</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-2">
                        <label>Nombre *</label>
                        <input type="text" name="name" class="form-control" value="{{ activity.name if activity else '' }}" required>
                    </div>
                    <div class="mb-2">
                        <label>Categoría</label>
                        <select name="category" class="form-control">
                            <option value="">Seleccione</option>
                            <option value="Lubricación" {% if activity and activity.category == 'Lubricación' %}selected{% endif %}>Lubricación</option>
                            <option value="Inspección" {% if activity and activity.category == 'Inspección' %}selected{% endif %}>Inspección</option>
                            <option value="Limpieza" {% if activity and activity.category == 'Limpieza' %}selected{% endif %}>Limpieza</option>
                            <option value="Ajuste" {% if activity and activity.category == 'Ajuste' %}selected{% endif %}>Ajuste</option>
                            <option value="Calibración" {% if activity and activity.category == 'Calibración' %}selected{% endif %}>Calibración</option>
                            <option value="Seguridad" {% if activity and activity.category == 'Seguridad' %}selected{% endif %}>Seguridad</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Descripción</label>
                        <textarea name="description" rows="2" class="form-control">{{ activity.description if activity else '' }}</textarea>
                    </div>
                    <div class="mb-2">
                        <label>Instrucciones detalladas</label>
                        <textarea name="instructions" rows="3" class="form-control">{{ activity.instructions if activity else '' }}</textarea>
                    </div>
                    <div class="mb-2">
                        <label>Duración estimada (min)</label>
                        <input type="number" name="estimated_duration_min" class="form-control" value="{{ activity.estimated_duration_min if activity else 0 }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label>Frecuencia sugerida</label>
                            <select name="default_freq_type" class="form-control">
                                <option value="">--</option>
                                {% for val, lab in freq_types %}
                                <option value="{{ val }}" {% if activity and activity.default_freq_type == val %}selected{% endif %}>{{ lab }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>Cada</label>
                            <input type="number" name="default_freq_value" class="form-control" value="{{ activity.default_freq_value if activity else 1 }}" min="1">
                        </div>
                    </div>
                    <div class="form-check mt-2">
                        <input type="checkbox" name="requires_shutdown" class="form-check-input" id="shutdown" {% if activity and activity.requires_shutdown %}checked{% endif %}>
                        <label class="form-check-label" for="shutdown">Requiere parada</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" name="requires_qualification" class="form-check-input" id="qualification" {% if activity and activity.requires_qualification %}checked{% endif %}>
                        <label class="form-check-label" for="qualification">Requiere personal calificado</label>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Guardar</button>
                    <a href="{{ url_for('preventive.catalog') }}" class="btn btn-secondary mt-3">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
