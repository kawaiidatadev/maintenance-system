{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white">
        <h4>Ejecutar grupo: {{ group.name }}</h4>
        <h6>{{ equipment.name }} ({{ equipment.code }})</h6>
    </div>
    <div class="card-body">
        <form method="POST">
            <p><strong>Instrucciones:</strong> Marque las actividades que ha completado.</p>
            <ul class="list-group mb-3">
                {% for act in activities %}
                <li class="list-group-item">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="completed_activities" value="{{ act.id }}" id="act{{ act.id }}">
                        <label class="form-check-label" for="act{{ act.id }}">
                            <strong>{{ act.name }}</strong><br>
                            <small>{{ act.description }}</small>
                            {% if act.instructions %}
                                <br><span class="text-muted">Instrucciones: {{ act.instructions }}</span>
                            {% endif %}
                        </label>
                    </div>
                </li>
                {% endfor %}
            </ul>
            <button type="submit" class="btn btn-success">Completar grupo</button>
            <a href="{{ url_for('preventive.dashboard') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
