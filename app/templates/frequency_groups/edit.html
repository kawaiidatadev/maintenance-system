{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Editar Grupo de Mantenimiento</h4>
            </div>
            <div class="card-body">
                <h5 class="text-muted">Equipo: {{ group.equipment.name }}</h5>
                <hr>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del grupo *</label>
                        <input type="text" name="name" class="form-control" value="{{ group.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="description" rows="2" class="form-control">{{ group.description or '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Frecuencia *</label>
                            <select name="freq_type" class="form-control" required>
                                {% for value, label in freq_types %}
                                <option value="{{ value }}" {% if group.freq_type == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Cada *</label>
                            <input type="number" name="freq_value" class="form-control" value="{{ group.freq_value }}" min="1" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Días de tolerancia</label>
                            <input type="number" name="tolerance_days" class="form-control" value="{{ group.tolerance_days }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Responsable *</label>
                        <select name="responsible_role" class="form-control" required>
                            {% for value, label in responsible_roles %}
                            <option value="{{ value }}" {% if group.responsible_role == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="requires_shutdown" class="form-check-input" id="shutdown" {% if group.requires_shutdown %}checked{% endif %}>
                        <label class="form-check-label" for="shutdown">Requiere parada de equipo</label>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_legal_requirement" class="form-check-input" id="legal" {% if group.is_legal_requirement %}checked{% endif %}>
                        <label class="form-check-label" for="legal">Es requerimiento legal o normativo</label>
                    </div>

                    <div class="mb-3" id="legalRefDiv" style="display: {% if group.is_legal_requirement %}block{% else %}none{% endif %};">
                        <label class="form-label">Referencia legal</label>
                        <input type="text" name="legal_reference" class="form-control" value="{{ group.legal_reference or '' }}">
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Actualizar grupo
                        </button>
                        <a href="{{ url_for('frequency_groups.view', group_id=group.id) }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const legalCheck = document.getElementById('legal');
    const legalRefDiv = document.getElementById('legalRefDiv');
    legalCheck.addEventListener('change', function() {
        legalRefDiv.style.display = this.checked ? 'block' : 'none';
    });
</script>
{% endblock %}
