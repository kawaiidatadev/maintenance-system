{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Editar Actividad Estándar</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la actividad *</label>
                        <input type="text" name="name" class="form-control" value="{{ activity.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select name="category" class="form-control">
                            <option value="">Seleccione...</option>
                            <option value="Lubricación" {% if activity.category == 'Lubricación' %}selected{% endif %}>Lubricación</option>
                            <option value="Inspección" {% if activity.category == 'Inspección' %}selected{% endif %}>Inspección</option>
                            <option value="Limpieza" {% if activity.category == 'Limpieza' %}selected{% endif %}>Limpieza</option>
                            <option value="Ajuste" {% if activity.category == 'Ajuste' %}selected{% endif %}>Ajuste</option>
                            <option value="Calibración" {% if activity.category == 'Calibración' %}selected{% endif %}>Calibración</option>
                            <option value="Seguridad" {% if activity.category == 'Seguridad' %}selected{% endif %}>Seguridad</option>
                            <option value="Otro" {% if activity.category == 'Otro' %}selected{% endif %}>Otro</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="description" rows="2" class="form-control">{{ activity.description or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Instrucciones detalladas</label>
                        <textarea name="instructions" rows="4" class="form-control">{{ activity.instructions or '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Duración estimada (minutos)</label>
                            <input type="number" name="estimated_duration_min" class="form-control" value="{{ activity.estimated_duration_min or 0 }}" min="0">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Frecuencia sugerida</label>
                            <select name="default_freq_type" class="form-control">
                                <option value="">Seleccione...</option>
                                <option value="days" {% if activity.default_freq_type == 'days' %}selected{% endif %}>Días</option>
                                <option value="weeks" {% if activity.default_freq_type == 'weeks' %}selected{% endif %}>Semanas</option>
                                <option value="months" {% if activity.default_freq_type == 'months' %}selected{% endif %}>Meses</option>
                                <option value="years" {% if activity.default_freq_type == 'years' %}selected{% endif %}>Años</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Cada</label>
                            <input type="number" name="default_freq_value" class="form-control" value="{{ activity.default_freq_value or 1 }}" min="1">
                        </div>
                        <div class="col-md-5 mb-3">
                            <label class="form-label">Responsable sugerido</label>
                            <select name="default_responsible_role" class="form-control">
                                <option value="">Seleccione...</option>
                                <option value="autonomous" {% if activity.default_responsible_role == 'autonomous' %}selected{% endif %}>Autónomo (Operador)</option>
                                <option value="specialized" {% if activity.default_responsible_role == 'specialized' %}selected{% endif %}>Especializado (Técnico)</option>
                                <option value="external" {% if activity.default_responsible_role == 'external' %}selected{% endif %}>Externo</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="requires_shutdown" class="form-check-input" id="shutdown" {% if activity.requires_shutdown %}checked{% endif %}>
                        <label class="form-check-label" for="shutdown">Requiere parada de equipo</label>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="requires_qualification" class="form-check-input" id="qualification" {% if activity.requires_qualification %}checked{% endif %}>
                        <label class="form-check-label" for="qualification">Requiere personal calificado</label>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Actualizar actividad
                        </button>
                        <a href="{{ url_for('standard_activities.index') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
