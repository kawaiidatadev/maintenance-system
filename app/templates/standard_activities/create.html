{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Nueva Actividad Estándar</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la actividad *</label>
                        <input type="text" name="name" class="form-control" required>
                        <small class="text-muted">Ej: Lubricación de rodamientos, Inspección visual, Calibración anual</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select name="category" class="form-control">
                            <option value="">Seleccione...</option>
                            <option value="Lubricación">Lubricación</option>
                            <option value="Inspección">Inspección</option>
                            <option value="Limpieza">Limpieza</option>
                            <option value="Ajuste">Ajuste</option>
                            <option value="Calibración">Calibración</option>
                            <option value="Seguridad">Seguridad</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="description" rows="2" class="form-control" placeholder="Breve descripción de la actividad"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Instrucciones detalladas</label>
                        <textarea name="instructions" rows="4" class="form-control" placeholder="Pasos a seguir, herramientas, precauciones..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Duración estimada (minutos)</label>
                            <input type="number" name="estimated_duration_min" class="form-control" value="0" min="0">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Frecuencia sugerida</label>
                            <select name="default_freq_type" class="form-control">
                                <option value="">Seleccione...</option>
                                <option value="days">Días</option>
                                <option value="weeks">Semanas</option>
                                <option value="months">Meses</option>
                                <option value="years">Años</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Cada</label>
                            <input type="number" name="default_freq_value" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-md-5 mb-3">
                            <label class="form-label">Responsable sugerido</label>
                            <select name="default_responsible_role" class="form-control">
                                <option value="">Seleccione...</option>
                                <option value="autonomous">Autónomo (Operador)</option>
                                <option value="specialized">Especializado (Técnico)</option>
                                <option value="external">Externo</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="requires_shutdown" class="form-check-input" id="shutdown">
                        <label class="form-check-label" for="shutdown">Requiere parada de equipo</label>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="requires_qualification" class="form-check-input" id="qualification">
                        <label class="form-check-label" for="qualification">Requiere personal calificado</label>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar actividad
                        </button>
                        <a href="{{ url_for('standard_activities.index') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
