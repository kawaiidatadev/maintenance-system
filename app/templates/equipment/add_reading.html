{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4><i class="fas fa-plus"></i> Agregar Lectura - {{ equipment.code }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="reading_value" class="form-label">Lectura del contador (horas)</label>
                        <input type="number" step="0.1" class="form-control" id="reading_value" name="reading_value" required>
                        <small class="text-muted">Valor actual del horómetro</small>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notas (opcional)</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar lectura</button>
                    <a href="{{ url_for('equipment.reading_history', id=equipment.id) }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
