{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning">
                <h4><i class="fas fa-edit"></i> Editar Usuario</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Rol</label>
                        <select class="form-control" id="role" name="role">
                            <option value="tecnico" {% if user.role == 'tecnico' %}selected{% endif %}>Técnico</option>
                            <option value="supervisor" {% if user.role == 'supervisor' %}selected{% endif %}>Supervisor</option>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Administrador</option>
                            <option value="viewer" {% if user.role == 'viewer' %}selected{% endif %}>Visualizador</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if user.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">
                                Usuario activo
                            </label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Nueva contraseña (dejar en blanco para no cambiar)</label>
                        <input type="password" class="form-control" id="password" name="password">
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
