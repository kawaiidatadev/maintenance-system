{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4><i class="fas fa-check-circle"></i> Completar OT: {{ order.number }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="downtime_hours" class="form-label">Tiempo de parada (horas)</label>
                            <input type="number" step="0.5" class="form-control" id="downtime_hours" name="downtime_hours" value="{{ order.downtime_hours or 0 }}">
                            <small class="text-muted">Tiempo que el equipo estuvo detenido</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="failure_type" class="form-label">Tipo de falla</label>
                            <select class="form-control" id="failure_type" name="failure_type">
                                <option value="">Seleccionar...</option>
                                <option value="electrico">Eléctrico</option>
                                <option value="mecanico">Mecánico</option>
                                <option value="hidraulico">Hidráulico</option>
                                <option value="neumatico">Neumático</option>
                                <option value="electronico">Electrónico</option>
                                <option value="operacion">Error de operación</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="root_cause" class="form-label">Causa raíz</label>
                        <textarea class="form-control" id="root_cause" name="root_cause" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="work_performed" class="form-label">Trabajo realizado</label>
                        <textarea class="form-control" id="work_performed" name="work_performed" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="parts_used" class="form-label">Repuestos utilizados</label>
                        <textarea class="form-control" id="parts_used" name="parts_used" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="resolution" class="form-label">Solución aplicada *</label>
                        <textarea class="form-control" id="resolution" name="resolution" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Completar OT</button>
                    <a href="{{ url_for('work_orders.view_order', id=order.id) }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
