{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-check-circle"></i> Completar OT: {{ order.number }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="resolution" class="form-label">Solución aplicada *</label>
                        <textarea class="form-control" id="resolution" name="resolution" rows="4" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="downtime_hours" class="form-label">Tiempo de parada (horas)</label>
                            <input type="number" step="0.5" class="form-control" id="downtime_hours" name="downtime_hours" value="0">
                            <small class="text-muted">Para cálculo de OEE</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="labor_hours" class="form-label">Horas hombre invertidas</label>
                            <input type="number" step="0.5" class="form-control" id="labor_hours" name="labor_hours" value="0">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success">Confirmar Cierre</button>
                    <a href="{{ url_for('work_orders.view_order', id=order.id) }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
