services:
  db:
    image: mysql:8.0
    container_name: maintenance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: maintenance_db
      MYSQL_USER: maintenance_user
      MYSQL_PASSWORD: userpass123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: maintenance_web
    restart: always
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://maintenance_user:userpass123@db:3306/maintenance_db
      SECRET_KEY: clave_secreta_para_desarrollo_12345
    volumes:
      - ./app:/app/app
      - ./static_uploads:/app/app/static/uploads

volumes:
  mysql_data: